Kind: Resource
ApiVersion: v0.10

# See all options:
# https://docs.next-hat.com/references/nanocl/resource
Resources:
  - Name: mock-certs-issuer
    Kind: CertManagerIssuer
    Version: v0.1
    Data:
      Generate:
        Name: mock-certs
        Container:
          Image: mock-certs-issuer:latest
  - Name: deploy-example.com
    Kind: ProxyRule
    Version: v0.7
    Metadata:
      CertManagerIssuer: mock-certs-issuer
    Data:
      Rules:
        - Domain: deploy-example.com
          Network: All
          Ssl: deploy-example.com@cert-manager
          Locations:
            - Path: /
              Target:
                Key: deploy-example.global.c
                Port: 9000
Cargoes:
  - Name: deploy-example
    Container:
      Image: nexthat/nanocl-get-started:latest
      Env:
        - APP=GET_STARTED
