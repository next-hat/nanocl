# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[package]
name = "ncertmanager"
version = "0.1.0"
edition = "2021"
authors = ["nanocl contributors <team@next-hat.com>"]
description = "Official nanocl certs manager"
readme = "readme.md"
license = "MIT OR Apache-2.0"
homepage = "https://docs.next-hat.com/docs/guides/nanocl/certs-manager"
repository = "https://github.com/nxthat/ncertmanager"

[[bin]]
name = "ncertmanager"
test = true
bench = false
path = "src/main.rs"

[features]
dev = []
test = []

[build-dependencies]
clap = { version = "4.4.5", features = ["derive"] }
clap_mangen = { version = "0.2" }
nanocl_stubs = { version = "0.10.0", features = ["utoipa"] }
utoipa = { version = "4.0" }
serde = "1.0.189"
serde_json = "1.0.107"
indexmap = "2.0.2"
bollard-next = {version = "0.15.4", features = ["utoipa"]}

[dev-dependencies]
serde_yaml = "0.9.25"

[dependencies]
log = "0.4.20"
clap = { version = "4.4.5", features = ["derive"] }
ntex = { version = "0.7.5", features = ["tokio"] }
ntex-util = { version = "0.3.2" }
tokio = { version = "1.33.0", features = ["fs"] }
serde = "1.0.189"
serde_json = "1.0.107"
futures = "0.3.25"
notify = { version = "6.1.1", default-features = false, features = [
  "macos_kqueue",
] }
nanocld_client = { version = "0.10.0" }
nanocl_error = { version = "0.1.0", features = ["serde_json", "http", "http_client", "io"] }
nanocl_utils = { version = "0.2.3", features = [
  "ntex",
  "logger",
  "io_error",
  "http_error",
  "serde_json",
  "versioning",
] }
utoipa = { version = "4.0", features = ["yaml"], optional = true }
openssl = "0.10.57"
