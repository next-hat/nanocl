[config]
default_to_workspace = false

[tasks.format]
install_crate = "rustfmt"
command = "cargo"
args = ["fmt"]

# Clean dependencies and build cache
[tasks.clean]
command = "cargo"
args = ["clean"]

# Run daemon
[tasks.run]
command = "cargo"
args = ["run", "${@}"]

# Build basic test image
[tasks.build-basic]
command = "docker"
args = ["build", "-t", "mock-certs-issuer:latest", "./tests/basic/"]

# Build openssl test image
[tasks.build-openssl]
command = "docker"
args = ["build", "-t", "openssl-issuer:latest", "./tests/openssl/"]

# Test all
[tasks.test]
command = "cargo"
args = ["nextest", "run", "-j", "1"]
dependencies = ["build-basic", "build-openssl"]

# Test all with debug output
[tasks.test-debug]
command = "cargo"
args = ["test", "--", "--nocapture"]

# Test coverage
[tasks.cov]
command = "cargo"
args = ["llvm-cov", "nextest", "-j", "1"]

# Test all with coverage for codecov
[tasks.covgen]
command = "cargo"
args = ["llvm-cov", "nextest", "--output-path", "./lcov.info", "--lcov"]
